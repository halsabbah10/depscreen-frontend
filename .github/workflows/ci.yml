name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    # npm audit is noisy about dev-only transitives; surface findings but
    # don't block PRs. Flip fail-fast by raising --audit-level or dropping
    # continue-on-error once we've triaged the backlog.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        # --omit=dev: skip dev-only transitives (rollup plugins, eslint, etc).
        # --audit-level=high: fail only on high or critical CVEs in prod deps.
        run: npm audit --omit=dev --audit-level=high

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://halsabbah-depscreen.hf.space

      - name: Verify build output
        run: |
          test -d dist || (echo "Build output missing" && exit 1)
          test -f dist/index.html || (echo "index.html missing" && exit 1)
          echo "Build output OK: $(du -sh dist | cut -f1)"
